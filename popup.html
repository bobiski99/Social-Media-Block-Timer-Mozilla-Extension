<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; }
    
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }
    
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    h2 { font-size: 15px; font-weight: 500; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 6px; color: #666; }
    .icon-btn:hover { background: #f0f0f0; }

    .row { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .top { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 5px; }
    .bar { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 4px; }
    .fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .info { font-size: 11px; color: #999; }
    .badge { font-size: 10px; background: #fee; color: #c33; padding: 2px 6px; border-radius: 4px; }

    .section-title { font-size: 11px; color: #999; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    .limit-row { display: flex; align-items: center; gap: 8px; margin: 14px 0 0; font-size: 12px; color: #888; }
    input[type=number] { width: 52px; border: 1px solid #ddd; border-radius: 4px; padding: 4px 6px; font-size: 13px; }

    .btn { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: transparent; font-size: 13px; cursor: pointer; margin-top: 10px; }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #534AB7; color: #fff; border-color: #534AB7; }
    .btn-primary:hover { background: #443ca0; }
    .btn-danger { border-color: #f5c2c2; color: #c33; }
    .btn-danger:hover { background: #fff5f5; }

    .site-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .site-item .remove-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0 4px; }
    .site-item .remove-btn:hover { color: #c33; }

    .add-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-row input[type=text] { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px; font-size: 13px; }
    .add-row button { padding: 6px 12px; border: 1px solid #534AB7; border-radius: 4px; background: #534AB7; color: #fff; font-size: 13px; cursor: pointer; }

    .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    .lang-btn { padding: 7px 8px; border: 1px solid #ddd; border-radius: 6px; background: transparent; font-size: 12px; cursor: pointer; text-align: left; }
    .lang-btn:hover { background: #f5f5f5; }
    .lang-btn.selected { border-color: #534AB7; background: #f0effc; color: #534AB7; font-weight: 500; }

    .back-btn { font-size: 13px; color: #534AB7; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>
  <div class="screen active" id="screen-main">
    <div class="header">
      <h2 id="txt-title">Günlük Kullanım</h2>
      <button class="icon-btn" id="btn-settings" title="Ayarlar">⚙️</button>
    </div>
    <div id="sites-list"></div>
    <div class="limit-row">
      <label id="txt-limit-label">Günlük limit:</label>
      <input type="number" id="limit" min="1" max="480" value="30">
      <span id="txt-min">dakika</span>
    </div>
    <button class="btn btn-primary" id="save-btn">Kaydet</button>
  </div>

  <div class="screen" id="screen-settings">
    <button class="back-btn" id="btn-back">← <span id="txt-back">Geri</span></button>
    <h2 id="txt-settings-title">Ayarlar</h2>

    <div class="section-title" id="txt-sites-title">Siteler</div>
    <div id="settings-sites-list"></div>
    <div class="add-row">
      <input type="text" id="new-site-input" placeholder="örn: reddit.com">
      <button id="add-site-btn">+</button>
    </div>

    <div class="section-title" id="txt-lang-title">Dil</div>
    <div class="lang-grid" id="lang-grid"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
